<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<title>DYDYD · Mobile UI Kit</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<link rel="stylesheet" href="../../colors_and_type.css"/>
<style>
  html,body{margin:0;padding:0;background:#07070D;color:#fff;font-family:var(--font-body);}
  body{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;background:radial-gradient(circle at 50% 0%, #15152a 0%, #07070D 70%);}
  #app{width:100%;max-width:420px}
  /* hide scrollbars in screen scrolls */
  *::-webkit-scrollbar{display:none}
  *{scrollbar-width:none}
</style>
</head>
<body>
<div id="app"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="tokens.jsx"></script>
<script type="text/babel" src="Atoms.jsx"></script>
<script type="text/babel" src="Cards.jsx"></script>
<script type="text/babel" src="Chrome.jsx"></script>
<script type="text/babel" src="QuestCard.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="QuestsScreen.jsx"></script>
<script type="text/babel" src="ProfileScreen.jsx"></script>
<script type="text/babel" src="QuestDetailScreen.jsx"></script>
<script type="text/babel" src="OnboardingScreen.jsx"></script>

<script type="text/babel" data-presets="env,react">
function App(){
  const [user, setUser] = React.useState(null);
  const [tab, setTab] = React.useState('home');
  const [detail, setDetail] = React.useState(null);

  if (!user) {
    return (
      <IOSDevice dark={true}>
        <div data-screen-label="00 Onboarding" style={{height:'100%', overflowY:'auto', background: dyColors.bg}}>
          <DYOnboardingScreen onComplete={(u)=>setUser({ name:u.name||'Eli', level:23, totalXP:12400, streak:12, premium:true, title:'Disciple of Discipline'})}/>
        </div>
      </IOSDevice>
    );
  }

  let body;
  if (detail) {
    body = <DYQuestDetailScreen quest={{...detail, baseXP: detail.baseXP||detail.xpValue||10, autoTrack: detail.autoTrack}} onBack={()=>setDetail(null)}/>;
  } else if (tab==='home') {
    body = <DYHomeScreen user={user} onNavigate={setTab}/>;
  } else if (tab==='quests') {
    body = <DYQuestsScreen onSelectQuest={(q)=>setDetail(q)}/>;
  } else if (tab==='profile') {
    body = <DYProfileScreen user={user}/>;
  } else {
    body = <div style={{padding:24, textAlign:'center', color: dyColors.fg3, marginTop:80}}>
      <div style={{fontSize:48, marginBottom:12}}>⚙️</div>
      <div style={{fontFamily:'var(--font-display,Sora)',fontWeight:700,color:'#fff',fontSize:18,marginBottom:6}}>Settings</div>
      <div style={{fontFamily:'var(--font-body,Manrope)',fontSize:13}}>Notifications, Wearables, Subscription, Sign Out</div>
    </div>;
  }

  const screenLabel = detail
    ? '04 Quest Detail'
    : tab==='home' ? '01 Home'
    : tab==='quests' ? '02 Quests'
    : tab==='profile' ? '03 Profile'
    : '05 Settings';

  return (
    <IOSDevice dark={true}>
      <div data-screen-label={screenLabel} style={{position:'relative', height:'100%', background: dyColors.bg, color:'#fff', overflow:'hidden'}}>
        <div style={{position:'absolute', inset:0, overflowY:'auto'}}>
          {body}
        </div>
        {!detail && <DYTabBar active={tab} onChange={(t)=>{setTab(t); setDetail(null);}}/>}
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(<App/>);
</script>
</body>
</html>
