<!doctype html>
<html><head><meta charset="utf-8"><title>Badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;color:#fff;font-family:var(--font-body);padding:18px}
  .row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
  .b{background:#1A1A2E;border:1px solid;border-radius:12px;padding:12px;display:flex;flex-direction:column;align-items:center;gap:6px}
  .gem{width:48px;height:48px;border-radius:24px;display:flex;align-items:center;justify-content:center;font-size:22px}
  .name{font-family:var(--font-display);font-weight:700;font-size:12px;text-align:center}
  .rar{font-family:var(--font-mono);font-size:10px;text-transform:capitalize;color:#888899}
</style></head>
<body>
<div class="row">
  <div class="b" style="border-color:#9CA3AF"><div class="gem" style="background:#9CA3AF33">🥾</div><div class="name">First Steps</div><div class="rar">common</div></div>
  <div class="b" style="border-color:#2563EB"><div class="gem" style="background:#2563EB33">🔥</div><div class="name">Month Master</div><div class="rar" style="color:#3B82F6">rare</div></div>
  <div class="b" style="border-color:#7C3AED"><div class="gem" style="background:#7C3AED33">🏆</div><div class="name">Century Club</div><div class="rar" style="color:#8B5CF6">epic</div></div>
  <div class="b" style="border-color:#F5B400"><div class="gem" style="background:#F5B40033">👑</div><div class="name">Year of Dedication</div><div class="rar" style="color:#FBBF24">legendary</div></div>
</div>
</body></html>
