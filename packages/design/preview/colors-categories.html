<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Categories</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;color:#fff;font-family:var(--font-body);padding:18px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .cat{border-radius:12px;padding:12px;background:#1A1A2E;border:1px solid #2A2A3E;display:flex;flex-direction:column;gap:8px}
  .dot{width:36px;height:36px;border-radius:10px}
  .name{font-family:var(--font-display);font-weight:700;font-size:13px}
  .hex{font-family:var(--font-mono);font-size:11px;color:#888899}
  .tint{height:8px;border-radius:4px}
</style></head>
<body>
  <div class="grid">
    <div class="cat"><div class="dot" style="background:#2EA043"></div><div class="name">Physical</div><div class="hex">#2EA043</div><div class="tint" style="background:#2EA04333"></div></div>
    <div class="cat"><div class="dot" style="background:#7C3AED"></div><div class="name">Mental</div><div class="hex">#7C3AED</div><div class="tint" style="background:#7C3AED33"></div></div>
    <div class="cat"><div class="dot" style="background:#2563EB"></div><div class="name">Career</div><div class="hex">#2563EB</div><div class="tint" style="background:#2563EB33"></div></div>
    <div class="cat"><div class="dot" style="background:#DC2626"></div><div class="name">Relationships</div><div class="hex">#DC2626</div><div class="tint" style="background:#DC262633"></div></div>
    <div class="cat"><div class="dot" style="background:#EA580C"></div><div class="name">Home</div><div class="hex">#EA580C</div><div class="tint" style="background:#EA580C33"></div></div>
  </div>
</body></html>
