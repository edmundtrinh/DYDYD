<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Body</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;color:#fff;padding:20px;font-family:var(--font-body)}

<body>
  <div class="stack">
    <div class="s"><span class="dy-h4">H4 — Section header</span><span class="meta">Manrope 600 · 18px</span></div>
    <div class="s"><span class="dy-body">Body — Stay hydrated by drinking water throughout the day.</span><span class="meta">Manrope 400 · 16px</span></div>
    <div class="s"><span class="dy-body-sm">Body sm — Auto-tracked from Apple Health.</span><span class="meta">Manrope 400 · 14px</span></div>
    <div class="s"><span class="dy-caption">Caption · 47 completions · Daily</span><span class="meta">Manrope 400 · 12px</span></div>
    <div class="s"><span class="dy-eyebrow">Eyebrow — Today's progress</span><span class="meta">Sora 700 caps · 11px</span></div>
  </div>
</body></html>
