<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Numerics</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;color:#fff;padding:22px;font-family:var(--font-body)}
  .row{display:flex;gap:24px;align-items:baseline}
  .num{font-family:var(--font-display);font-weight:800;letter-spacing:-0.02em;font-variant-numeric:tabular-nums}
  .xp{color:#F5B400;font-size:64px}
  .lvl{color:#fff;font-size:48px}
  .pct{color:#2EA043;font-size:40px}
  .label{font-family:var(--font-display);font-size:11px;letter-spacing:0.12em;text-transform:uppercase;font-weight:700;color:#888899;margin-top:4px}
  .col{display:flex;flex-direction:column}
  .mono{font-family:var(--font-mono);color:#B7B7CC;font-size:13px;margin-top:14px}
</style></head>
<body>
  <div class="row">
    <div class="col"><span class="num xp">+1,247</span><span class="label">Loot · XP</span></div>
    <div class="col"><span class="num lvl">Lv 23</span><span class="label">Level</span></div>
    <div class="col"><span class="num pct">68%</span><span class="label">to Lv 24</span></div>
  </div>
  <div class="mono">user-quest-id: q_8f3a · streak=12d · src=apple_health</div>
</body></html>
