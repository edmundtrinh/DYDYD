<!doctype html>
<html><head><meta charset="utf-8"><title>Type · Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;color:#fff;padding:20px;font-family:var(--font-body)}
  .stack{display:flex;flex-direction:column;gap:6px}
  .s{display:flex;align-items:baseline;gap:16px;border-bottom:1px solid #2A2A3E;padding-bottom:6px}
  .meta{font-family:var(--font-mono);font-size:10px;color:#888899;white-space:nowrap}
  h1,h2,h3,h4{margin:0}
</style></head>
<body>
  <div class="stack">
    <div class="s"><span class="dy-display">Level Up</span><span class="meta">Sora 800 · 44px · -0.02em</span></div>
    <div class="s"><span class="dy-h1">Quest Library</span><span class="meta">Sora 700 · 32px</span></div>
    <div class="s"><span class="dy-h2">Today's Quests</span><span class="meta">Sora 700 · 24px</span></div>
    <div class="s"><span class="dy-h3">Walk 10,000 Steps</span><span class="meta">Sora 600 · 20px</span></div>
  </div>
</body></html>
