<!doctype html>
<html><head><meta charset="utf-8"><title>Tab Bar</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;color:#fff;font-family:var(--font-body);padding:24px;display:flex;align-items:center;justify-content:center;min-height:120px}
  .bar{display:flex;background:#1A1A2E;border-top:1px solid #2A2A3E;border-radius:18px;width:100%;padding:8px;gap:4px;box-shadow:0 12px 32px rgba(0,0,0,0.55)}
  .item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 4px;border-radius:14px;font-family:var(--font-display);font-weight:600;font-size:11px;color:#5A5A6E;letter-spacing:0.04em}
  .item .ico{font-size:22px;filter:grayscale(0.6)}
  .item.active{background:rgba(46,160,67,0.16);color:#34C75A}
  .item.active .ico{filter:none}
</style></head>
<body>
<div class="bar">
  <div class="item active"><span class="ico">🏰</span>Home</div>
  <div class="item"><span class="ico">📜</span>Quests</div>
  <div class="item"><span class="ico">🛡️</span>Profile</div>
  <div class="item"><span class="ico">⚙️</span>Settings</div>
</div>
</body></html>
