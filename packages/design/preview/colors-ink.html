<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Ink</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;font-family:var(--font-body);padding:22px}
  .stack{display:flex;flex-direction:column;gap:6px}
  .row{display:flex;align-items:baseline;gap:14px;border-bottom:1px solid #2A2A3E;padding:8px 0}
  .label{font-family:var(--font-display);font-weight:700;font-size:18px;width:200px;letter-spacing:-0.01em}
  .meta{font-family:var(--font-mono);font-size:11px;color:#888899}
</style></head>
<body>
  <div class="stack">
    <div class="row"><div class="label" style="color:#FFFFFF">Ink 1 — primary</div><div class="meta">#FFFFFF · headings, names</div></div>
    <div class="row"><div class="label" style="color:#B7B7CC">Ink 2 — body</div><div class="meta">#B7B7CC · paragraphs</div></div>
    <div class="row"><div class="label" style="color:#888899">Ink 3 — secondary</div><div class="meta">#888899 · meta, captions</div></div>
    <div class="row"><div class="label" style="color:#5A5A6E">Ink 4 — tertiary</div><div class="meta">#5A5A6E · disabled, deep meta</div></div>
  </div>
</body></html>
