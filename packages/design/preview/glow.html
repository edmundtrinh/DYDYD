<!doctype html>
<html><head><meta charset="utf-8"><title>Glow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;color:#fff;font-family:var(--font-body);padding:32px}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
  .card{height:90px;background:#1A1A2E;border-radius:12px;display:flex;flex-direction:column;justify-content:flex-end;padding:12px}
  .g1{box-shadow:0 0 0 1px rgba(46,160,67,0.55), 0 0 24px rgba(46,160,67,0.35)}
  .g2{box-shadow:0 0 0 1px rgba(245,180,0,0.6),  0 0 24px rgba(245,180,0,0.4)}
  .g3{box-shadow:0 0 0 1px rgba(124,58,237,0.55),0 0 24px rgba(124,58,237,0.35)}
  .name{font-family:var(--font-display);font-weight:700;font-size:13px}
  .meta{font-family:var(--font-mono);font-size:10px;color:#888899}
</style></head>
<body>
<div class="grid">
  <div class="card g1"><div class="name">Glow · Green</div><div class="meta">--glow-green · active quest</div></div>
  <div class="card g2"><div class="name">Glow · Gold</div><div class="meta">--glow-gold · level-up, premium</div></div>
  <div class="card g3"><div class="name">Glow · Purple</div><div class="meta">--glow-purple · arcane focus</div></div>
</div>
</body></html>
