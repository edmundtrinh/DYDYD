<!doctype html>
<html><head><meta charset="utf-8"><title>Spacing</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;color:#fff;font-family:var(--font-body);padding:20px}
  .stack{display:flex;flex-direction:column;gap:6px}
  .row{display:flex;align-items:center;gap:12px}
  .bar{height:14px;background:#F5B400;border-radius:3px}
  .name{font-family:var(--font-mono);font-size:11px;color:#888899;width:64px}
  .val{font-family:var(--font-mono);font-size:11px;color:#fff;width:56px;text-align:right}
</style></head>
<body>
<div class="stack">
  <div class="row"><span class="name">--s-1</span><div class="bar" style="width:4px"></div><span class="val">4</span></div>
  <div class="row"><span class="name">--s-2</span><div class="bar" style="width:8px"></div><span class="val">8</span></div>
  <div class="row"><span class="name">--s-3</span><div class="bar" style="width:12px"></div><span class="val">12</span></div>
  <div class="row"><span class="name">--s-4</span><div class="bar" style="width:16px"></div><span class="val">16</span></div>
  <div class="row"><span class="name">--s-5</span><div class="bar" style="width:20px"></div><span class="val">20</span></div>
  <div class="row"><span class="name">--s-6</span><div class="bar" style="width:24px"></div><span class="val">24</span></div>
  <div class="row"><span class="name">--s-7</span><div class="bar" style="width:32px"></div><span class="val">32</span></div>
  <div class="row"><span class="name">--s-8</span><div class="bar" style="width:40px"></div><span class="val">40</span></div>
  <div class="row"><span class="name">--s-9</span><div class="bar" style="width:48px"></div><span class="val">48</span></div>
  <div class="row"><span class="name">--s-10</span><div class="bar" style="width:64px"></div><span class="val">64</span></div>
</div>
</body></html>
