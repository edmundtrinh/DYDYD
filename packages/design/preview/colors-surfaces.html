<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Surfaces</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#07070D;color:#fff;font-family:var(--font-body);padding:18px}
  .row{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .s{border-radius:12px;height:120px;display:flex;flex-direction:column;justify-content:space-between;padding:12px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.05)}
  .name{font-family:var(--font-display);font-weight:700;font-size:13px}
  .hex{font-family:var(--font-mono);font-size:11px;opacity:0.7}
</style></head>
<body>
  <div class="row">
    <div class="s" style="background:#07070D"><div class="name">Void</div><div class="hex">#07070D</div></div>
    <div class="s" style="background:#0F0F1A"><div class="name">Base</div><div class="hex">#0F0F1A</div></div>
    <div class="s" style="background:#1A1A2E"><div class="name">Surface 1</div><div class="hex">#1A1A2E</div></div>
    <div class="s" style="background:#232338"><div class="name">Surface 2</div><div class="hex">#232338</div></div>
    <div class="s" style="background:#2A2A3E"><div class="name">Surface 3 / Border</div><div class="hex">#2A2A3E</div></div>
  </div>
</body></html>
