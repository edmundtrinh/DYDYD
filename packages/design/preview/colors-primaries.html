<!doctype html>
<html><head><meta charset="utf-8"><title>Colors · Primaries</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;color:#fff;font-family:var(--font-body);padding:18px}
  .grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px}
  .swatch{border-radius:12px;height:120px;display:flex;flex-direction:column;justify-content:flex-end;padding:10px;box-shadow:inset 0 0 0 1px rgba(255,255,255,0.06)}
  .swatch .name{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:-0.01em}
  .swatch .hex{font-family:var(--font-mono);font-size:11px;opacity:0.85}
</style></head>
<body>
  <div class="grid">
    <div class="swatch" style="background:#2EA043"><div class="name">Quest Green</div><div class="hex">#2EA043</div></div>
    <div class="swatch" style="background:#2563EB"><div class="name">Mana Blue</div><div class="hex">#2563EB</div></div>
    <div class="swatch" style="background:#7C3AED"><div class="name">Arcane Purple</div><div class="hex">#7C3AED</div></div>
    <div class="swatch" style="background:#EA580C"><div class="name">Flame Orange</div><div class="hex">#EA580C</div></div>
    <div class="swatch" style="background:#DC2626"><div class="name">Heart Red</div><div class="hex">#DC2626</div></div>
    <div class="swatch" style="background:#F5B400;color:#0B0B12"><div class="name">Loot Gold</div><div class="hex">#F5B400</div></div>
  </div>
</body></html>
