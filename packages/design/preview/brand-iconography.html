<!doctype html>
<html><head><meta charset="utf-8"><title>Iconography</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body{margin:0;background:#0F0F1A;color:#fff;font-family:var(--font-body);padding:18px}
  .grid{display:grid;grid-template-columns:repeat(5,1fr);gap:10px}
  .cell{background:#1A1A2E;border:1px solid #2A2A3E;border-radius:12px;padding:10px;display:flex;flex-direction:column;align-items:center;gap:6px}
  .cell img{width:48px;height:48px}
  .name{font-family:var(--font-display);font-weight:700;font-size:11px;text-align:center}
  .glyph{font-size:24px}
  .meta{font-family:var(--font-mono);font-size:9px;color:#888899}
</style></head>
<body>
<div class="grid">
  <div class="cell"><img src="../assets/icons/category-physical.svg"><div class="name">Physical</div><div class="meta">SVG · in-house</div></div>
  <div class="cell"><img src="../assets/icons/category-mental.svg"><div class="name">Mental</div><div class="meta">SVG · in-house</div></div>
  <div class="cell"><img src="../assets/icons/category-career.svg"><div class="name">Career</div><div class="meta">SVG · in-house</div></div>
  <div class="cell"><img src="../assets/icons/category-relationships.svg"><div class="name">Relationships</div><div class="meta">SVG · in-house</div></div>
  <div class="cell"><img src="../assets/icons/category-home.svg"><div class="name">Home</div><div class="meta">SVG · in-house</div></div>
  <div class="cell"><span class="glyph">💪</span><div class="name">Physical (mobile)</div><div class="meta">emoji</div></div>
  <div class="cell"><span class="glyph">🧠</span><div class="name">Mental (mobile)</div><div class="meta">emoji</div></div>
  <div class="cell"><span class="glyph">💼</span><div class="name">Career (mobile)</div><div class="meta">emoji</div></div>
  <div class="cell"><span class="glyph">❤️</span><div class="name">Relationships</div><div class="meta">emoji</div></div>
  <div class="cell"><span class="glyph">🏠</span><div class="name">Home (mobile)</div><div class="meta">emoji</div></div>
</div>
</body></html>
